<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CI Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="header-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.1.82-.26.82-.58v-2.03c-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.14-.3-.54-1.52.1-3.18 0 0 1.01-.32 3.3 1.23A11.5 11.5 0 0 1 12 6.8c1.02.005 2.05.138 3.01.404 2.28-1.552 3.285-1.23 3.285-1.23.645 1.66.24 2.88.12 3.18.77.84 1.235 1.91 1.235 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22v3.29c0 .32.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12"/>
      </svg>
    </div>
    <h1>CI Dashboard</h1>
    <span class="header-org" id="org-name">—</span>
  </div>
  <div class="sync-info">
    <span class="sync-dot"></span>
    <span id="sync-time">loading…</span>
  </div>
</header>

<main class="main">

  <!-- Summary cards -->
  <div class="summary-grid" id="summary-grid">
    <div class="stat-card"><div class="stat-label">Org pass rate</div><div class="stat-value">—</div></div>
    <div class="stat-card"><div class="stat-label">Avg build time</div><div class="stat-value">—</div></div>
    <div class="stat-card"><div class="stat-label">Open PRs</div><div class="stat-value">—</div></div>
    <div class="stat-card"><div class="stat-label">Repos with Open PRs</div><div class="stat-value">—</div></div>
  </div>

  <!-- Charts -->
  <div class="charts-section">
    <div class="section-label">Org Overview</div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-card-title">Health Breakdown</div>
        <canvas id="chart-donut" height="132"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">Pass Rate Distribution</div>
        <canvas id="chart-pass-dist" height="132"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">Build Duration Distribution</div>
        <canvas id="chart-dur-dist" height="132"></canvas>
      </div>
    </div>
  </div>

  <!-- Filter bar + table -->
  <div id="repo-table-section">
    <div class="section-label">Repositories</div>
    <div class="filter-bar">
      <div class="search-wrap">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search" placeholder="Search repos…" autocomplete="off" />
      </div>
      <select id="group-select">
        <option value="">All groups</option>
      </select>
      <div class="status-pills">
        <button class="pill active-all" data-status="">All</button>
        <button class="pill" data-status="passing">Passing</button>
        <button class="pill" data-status="degraded">Degraded</button>
      </div>
      <span class="repo-count" id="repo-count"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="col-repo"          data-sort="name">Repo</th>
            <th class="col-group"         data-sort="group">Group</th>
            <th class="col-pass right"    data-sort="pass_rate">Pass %</th>
            <th class="col-dur right"     data-sort="avg_duration_seconds">Avg build</th>
            <th class="col-prs right"     data-sort="open_prs">Open PRs</th>
            <th class="col-last right"    data-sort="last_run_at">Last run</th>
            <th class="col-bar"></th>
          </tr>
        </thead>
        <tbody id="repo-tbody">
          <tr><td colspan="7" class="state-msg">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/charts.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
